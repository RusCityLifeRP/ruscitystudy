<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RusCity Study | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary" href="#">RusCity Study</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="#" id="nav-dashboard" onclick="switchTab('dashboard')">Состав</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-rules" onclick="switchTab('rules')">Правила</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-academy" onclick="switchTab('academy')">Школа Админа</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Dashboard -->
        <div id="tab-dashboard" class="tab-content">
            <h3>Управление персоналом RusCity</h3>
            <table class="table table-dark table-hover border-secondary">
                <thead><tr><th>Ник</th><th>Роль</th><th>Онлайн</th><th>Статус</th></tr></thead>
                <tbody id="staffTableBody"></tbody>
            </table>
        </div>

        <!-- Rules -->
        <div id="tab-rules" class="tab-content d-none">
            <div class="d-flex justify-content-between"><h3>Регламент проекта</h3>
            <button class="btn btn-primary btn-sm" onclick="openRuleModal()">+ Добавить</button></div>
            <div id="rulesContainer" class="row mt-3"></div>
        </div>

        <!-- Academy -->
        <div id="tab-academy" class="tab-content d-none">
            <h3>Школа администратора RusCity Study</h3>
            <div id="stageContent" class="card bg-dark p-4 mt-3"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="ruleModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content bg-dark">
        <div class="modal-header"><h5>Редактирование</h5></div>
        <div class="modal-body">
            <input type="text" id="ruleTitle" class="form-control mb-2" placeholder="Заголовок">
            <textarea id="ruleBody" class="form-control" placeholder="Текст правила"></textarea>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <button class="btn btn-primary" onclick="saveRule()">Сохранить</button></div>
    </div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
